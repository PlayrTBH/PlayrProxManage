# Proxmox Manager — nginx reverse proxy.
# Install to /etc/nginx/sites-available/proxmox-manager then symlink into
# sites-enabled. Replace pmx.example.com with your hostname.
#
# TLS: easiest path is certbot --
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d pmx.example.com
# which fills in the ssl_certificate lines automatically.

# Rate-limit zone for the login endpoint (brute-force defense at the edge,
# in addition to the app's own limiter).
limit_req_zone $binary_remote_addr zone=pmx_login:10m rate=10r/m;

server {
    listen 80;
    server_name pmx.example.com;
    # Redirect everything to HTTPS.
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name pmx.example.com;

    # certbot populates these:
    # ssl_certificate     /etc/letsencrypt/live/pmx.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pmx.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers.
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 1m;

    # Tighter rate limit specifically on login.
    location = /api/login {
        limit_req zone=pmx_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8800;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
